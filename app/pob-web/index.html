<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path of Building MK2</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #14141c;
        color: #ddd;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="pob_canvas"></canvas>
    <div id="loading">Loading…</div>
    <script>
      window.addEventListener("load", () => {
        // Hide the loading message once eframe has taken over the canvas.
        setTimeout(() => {
          const el = document.getElementById("loading");
          if (el) el.style.display = "none";
        }, 1500);
      });
    </script>
  </body>
</html>
